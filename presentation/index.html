<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>Evaluierung von algorithmischen und vektor-basierten Verfahren für kontinuierliches Log-Clustering</title>

  <link rel="stylesheet" href="node_modules/reveal.js/dist/reset.css" />
  <link rel="stylesheet" href="node_modules/reveal.js/dist/reveal.css" />
  <link rel="stylesheet" href="node_modules/reveal.js/dist/theme/white.css" />

  <style>
    /* ── THM Brand Colors ─────────────────────────────── */
    :root {
      --thm-green : #83B817;
      --thm-gray  : #4B5C68;
      --thm-light : #f5f5f5;
    }

    /* ── Global slide layout ──────────────────────────── */
    .reveal .slides section {
      box-sizing : border-box;
      padding    : 60px 60px 70px 60px; /* top right bottom left */
      height     : 100%;
      text-align : left;
    }

    /* ── Logo – top right ─────────────────────────────── */
    .reveal .slides section::before {
      content    : "";
      position   : absolute;
      top        : 18px;
      right      : 30px;
      width      : 160px;
      height     : 33px;
      background : url("images/image.png") no-repeat center / contain;
    }

    /* ── Bottom bar ───────────────────────────────────── */
    .reveal .slides section::after {
      content    : "";
      position   : absolute;
      bottom     : 28px;
      left       : 40px;
      right      : 40px;
      height     : 3px;
      background : var(--thm-green);
      border-radius: 2px;
    }

    /* ── Typography ───────────────────────────────────── */
    .reveal h1, .reveal h2, .reveal h3 {
      color      : var(--thm-gray);
      font-weight: 700;
      text-align : left;
    }

    .reveal h1 { font-size: 1.7em; }
    .reveal h2 { font-size: 1.3em; border-bottom: 2px solid var(--thm-green); padding-bottom: 6px; margin-bottom: 0.6em; }
    .reveal h3 { font-size: 1.05em; color: var(--thm-green); }

    .reveal p, .reveal li { font-size: 0.82em; line-height: 1.6; }

    /* ── Title slide overrides ────────────────────────── */
    .reveal .slides section.title-slide {
      display        : flex;
      flex-direction : column;
      justify-content: center;
    }

    .reveal .slides section.title-slide .subtitle {
      font-size  : 0.75em;
      color      : var(--thm-gray);
      margin-top : 0.4em;
    }

    .reveal .slides section.title-slide .meta {
      margin-top : 2.5em;
      font-size  : 0.65em;
      color      : #777;
      line-height: 1.8;
    }

    /* ── Accent highlight ─────────────────────────────── */
    .accent { color: var(--thm-green); font-weight: 600; }

    /* ── Slide number ─────────────────────────────────── */
    .reveal .slide-number {
      bottom     : 22px;
      right      : 44px;
      font-size  : 0.55em;
      color      : var(--thm-gray);
      background : transparent;
    }
  </style>
</head>
<body>
<div class="reveal">
  <div class="slides">

  </div>
</div>

<script src="node_modules/reveal.js/dist/reveal.js"></script>
<script>
  // Slides werden alphabetisch aus slides/ geladen.
  // Neue Folie anlegen: slides/03-meinThema.html usw.
  const SLIDES = [
    "slides/01-title.html",
    "slides/02-gliederung.html",
  ];

  async function loadSlides() {
    const container = document.querySelector(".reveal .slides");
    for (const src of SLIDES) {
      const res  = await fetch(src);
      const html = await res.text();
      container.insertAdjacentHTML("beforeend", html);
    }
    Reveal.initialize({
      hash           : true,
      slideNumber    : "c/t",
      transition     : "slide",
      transitionSpeed: "fast",
      controls       : true,
      progress       : false,
      center         : false,
      width          : 1280,
      height         : 720,
    });
  }

  loadSlides();
</script>
</body>
</html>
